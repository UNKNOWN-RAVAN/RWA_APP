<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWA Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #121212;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --gradient-start: #ff69b4;
            --gradient-end: #0dcaf0;
        }
        
        body {
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid var(--border-color);
        }
        
        .card {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #ff69b4, #0dcaf0);
            border: none;
        }
        
        .table {
            color: var(--text-primary);
        }
        
        .table thead th {
            border-bottom-color: var(--border-color);
        }
        
        .table td {
            border-top-color: var(--border-color);
        }
        
        .badge-batch {
            background: linear-gradient(90deg, #ff69b4, #0dcaf0);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .content-card {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .content-card:hover {
            border-color: #0dcaf0;
            transform: translateX(5px);
        }
        
        .modal-content {
            background: var(--card-color);
            border: 1px solid var(--border-color);
        }
        
        .btn-close-white {
            filter: invert(1);
        }
        
        #videoPlayer {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }
        
        #videoPlayer iframe, #videoPlayer video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .token-text {
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }
        
        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">RWA Admin Panel</a>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-info btn-sm" onclick="showAddUserModal()">
                    <i class="bi bi-person-plus"></i> Add User
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5 pt-4">
        <div id="dashboardSection">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h3 id="totalUsers">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h3 id="totalBatches">0</h3>
                        <p>Total Batches</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 text-center">
                        <h3 id="totalTokens">0</h3>
                        <p>Active Tokens</p>
                    </div>
                </div>
            </div>
            
            <div class="card p-3 mb-4">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="searchUser" placeholder="Search by mobile number..." onkeyup="searchUsers()">
                </div>
            </div>
            
            <div class="card p-3">
                <h4 class="mb-3">All Users</h4>
                <div id="usersList"></div>
            </div>
        </div>
    </div>
    
    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" class="form-control" id="newMobile" placeholder="Enter mobile number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="Enter password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">JWT Token (Optional)</label>
                        <textarea class="form-control" id="newToken" rows="3" placeholder="Paste JWT token here (optional)"></textarea>
                        <small class="text-secondary">If token is provided, user can login directly with token</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Platform</label>
                        <select class="form-select" id="newApiBase">
                            <option value="https://rozgarapinew.teachx.in">RWA</option>
                            <option value="https://winnersinstituteapi.classx.co.in">Winners Institute</option>
                            <option value="https://mgconceptapi.classx.co.in">Mg Concept</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="addUser()">Add User</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Video Modal -->
    <div class="modal fade" id="videoModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="videoTitle">Video Player</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="videoPlayer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- PDF Modal -->
    <div class="modal fade" id="pdfModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pdfTitle">PDF Viewer</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="height: 80vh;">
                    <iframe id="pdfFrame" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== CRYPTO/DECRYPTION FUNCTIONS =====
        const ENCRYPTION_KEY = '638udh3829162018';
        const ENCRYPTION_IV = 'fedcba9876543210';
        
        function restoreBase64(urlSafe) {
            return urlSafe.replace(/-/g, '+').replace(/_/g, '/').replace(/~/g, '=');
        }
        
        function decryptUrl(encrypted) {
            try {
                if (!encrypted) return "";
                const restored = restoreBase64(encrypted);
                const decrypted = CryptoJS.AES.decrypt(restored, CryptoJS.enc.Utf8.parse(ENCRYPTION_KEY), {
                    iv: CryptoJS.enc.Utf8.parse(ENCRYPTION_IV),
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });
                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                console.error('Decryption error:', e);
                return encrypted;
            }
        }
        // ======================================
        
        let ADMIN_CRED = null;
        
        function showToast(message, isError = false) {
            const toastHtml = `
                <div class="toast-custom">
                    <div class="toast show" role="alert">
                        <div class="toast-header ${isError ? 'bg-danger' : 'bg-success'} text-white">
                            <strong class="me-auto">${isError ? 'Error' : 'Success'}</strong>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                        </div>
                        <div class="toast-body">${message}</div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', toastHtml);
            setTimeout(() => {
                const toast = document.querySelector('.toast-custom');
                if (toast) toast.remove();
            }, 3000);
        }
        
        function showAddUserModal() {
            document.getElementById('newMobile').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newToken').value = '';
            new bootstrap.Modal(document.getElementById('addUserModal')).show();
        }
        
        async function addUser() {
            const mobile = document.getElementById('newMobile').value.trim();
            const password = document.getElementById('newPassword').value;
            const token = document.getElementById('newToken').value.trim();
            const apiBase = document.getElementById('newApiBase').value;
            
            if (!mobile || !password) {
                showToast('Mobile and password are required', true);
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/add-user?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}&mobile=${mobile}&pass=${password}&token=${token}&api=${apiBase}`);
                const data = await response.json();
                
                if (data.success) {
                    showToast('User added successfully');
                    bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                    await loadDashboard();
                } else {
                    throw new Error(data.error || 'Failed to add user');
                }
            } catch (error) {
                showToast('Error: ' + error.message, true);
            }
        }
        
        async function loadDashboard() {
            try {
                const usersRes = await fetch(`/api/admin/users?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}`);
                const usersData = await usersRes.json();
                
                const batchesRes = await fetch(`/api/admin/batches?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}`);
                const batchesData = await batchesRes.json();
                
                document.getElementById('totalUsers').innerText = usersData.total_users || 0;
                document.getElementById('totalBatches').innerText = batchesData.total_batches || 0;
                document.getElementById('totalTokens').innerText = usersData.users?.filter(u => u.token).length || 0;
                
                displayUsers(usersData.users || []);
            } catch (error) {
                showToast('Error loading dashboard: ' + error.message, true);
            }
        }
        
        function displayUsers(users) {
            const container = document.getElementById('usersList');
            container.innerHTML = '';
            
            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'card mb-3';
                card.setAttribute('data-mobile', user.mobile);
                card.innerHTML = `
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start flex-wrap">
                            <div>
                                <h5 class="card-title">📱 ${user.mobile}</h5>
                                <p class="card-text text-secondary">User ID: ${user.user_id}</p>
                                <p class="card-text text-secondary">Last Login: ${user.last_login ? new Date(user.last_login).toLocaleString() : 'Never'}</p>
                                <p class="card-text text-secondary">Login Count: ${user.login_count || 0}</p>
                                ${user.token ? `<div class="token-text mt-2"><small>Token: ${user.token.substring(0, 50)}...</small></div>` : '<span class="badge bg-secondary">No Token</span>'}
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <button class="btn btn-outline-info btn-sm" onclick="toggleUserBatches('${user.mobile}')">
                                    <i class="bi bi-collection-play"></i> View Batches
                                </button>
                                <button class="btn btn-outline-success btn-sm" onclick="showAddTokenModal('${user.mobile}')">
                                    <i class="bi bi-key"></i> Add Token
                                </button>
                            </div>
                        </div>
                        <div id="userBatches_${user.mobile}" style="display: none;" class="mt-3">
                            <hr>
                            <h6>📚 Purchased Batches:</h6>
                            <div class="row" id="batchesList_${user.mobile}"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        async function toggleUserBatches(mobile) {
            const batchesDiv = document.getElementById(`userBatches_${mobile}`);
            const batchesList = document.getElementById(`batchesList_${mobile}`);
            
            if (batchesDiv.style.display === 'none') {
                batchesDiv.style.display = 'block';
                batchesList.innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-info"></div></div>';
                
                try {
                    const response = await fetch(`/api/admin/batches?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}&mobile=${mobile}`);
                    const data = await response.json();
                    
                    if (data.success && data.user && data.user.batches) {
                        batchesList.innerHTML = '';
                        if (data.user.batches.length === 0) {
                            batchesList.innerHTML = '<div class="col-12 text-secondary">No batches purchased</div>';
                        } else {
                            data.user.batches.forEach(batch => {
                                const col = document.createElement('div');
                                col.className = 'col-md-6 mb-2';
                                col.innerHTML = `
                                    <div class="content-card" onclick="fetchBatchContent('${mobile}', ${batch.batch_id}, '${batch.batch_name.replace(/'/g, "\\'")}')">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <strong>${batch.batch_name}</strong>
                                                <br>
                                                <small class="text-secondary">ID: ${batch.batch_id}</small>
                                            </div>
                                            <i class="bi bi-chevron-right"></i>
                                        </div>
                                    </div>
                                `;
                                batchesList.appendChild(col);
                            });
                        }
                    }
                } catch (error) {
                    batchesList.innerHTML = '<div class="col-12 text-danger">Error loading batches</div>';
                }
            } else {
                batchesDiv.style.display = 'none';
            }
        }
        
        async function fetchBatchContent(mobile, batchId, batchName) {
            try {
                const response = await fetch(`/api/admin/user-content?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}&mobile=${mobile}&batch_id=${batchId}`);
                const data = await response.json();
                
                if (data.success && data.content) {
                    showContentModal(data.content, batchName);
                } else {
                    showToast('No content found for this batch', true);
                }
            } catch (error) {
                showToast('Error fetching content: ' + error.message, true);
            }
        }
        
        function showContentModal(content, batchName) {
            const modalHtml = `
                <div class="modal fade" id="contentModal" tabindex="-1">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">${batchName} - All Content</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row" id="modalContentList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const container = document.getElementById('modalContentList');
            container.innerHTML = '';
            
            content.forEach(item => {
                const decryptedUrl = decryptUrl(item.url);
                const col = document.createElement('div');
                col.className = 'col-md-6 mb-3';
                col.innerHTML = `
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">${item.title}</h6>
                                <small class="text-secondary">${item.type === 'video' ? '🎬 Video' : '📄 PDF'}</small>
                                <br>
                                <small class="text-secondary">${item.subject} / ${item.topic}</small>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="viewContent('${decryptedUrl}', '${item.title.replace(/'/g, "\\'")}', '${item.type}')">
                                <i class="bi bi-${item.type === 'video' ? 'play-fill' : 'file-earmark-text-fill'}"></i> View
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
            
            new bootstrap.Modal(document.getElementById('contentModal')).show();
            document.getElementById('contentModal').addEventListener('hidden.bs.modal', () => {
                document.getElementById('contentModal').remove();
            });
        }
        
        function viewContent(url, title, type) {
            if (!url) {
                showToast('Content URL not available', true);
                return;
            }
            
            if (type === 'video') {
                const videoPlayer = document.getElementById('videoPlayer');
                document.getElementById('videoTitle').innerText = title;
                videoPlayer.innerHTML = '';
                
                if (url.includes('youtu.be') || url.includes('youtube')) {
                    const videoId = url.split('/').pop().split('?')[0];
                    videoPlayer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    videoPlayer.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
                }
                
                new bootstrap.Modal(document.getElementById('videoModal')).show();
            } else {
                document.getElementById('pdfTitle').innerText = title;
                document.getElementById('pdfFrame').src = url;
                new bootstrap.Modal(document.getElementById('pdfModal')).show();
            }
        }
        
        function showAddTokenModal(mobile) {
            const token = prompt(`Enter JWT Token for ${mobile}:`);
            if (token && token.trim()) {
                addTokenToUser(mobile, token.trim());
            }
        }
        
        async function addTokenToUser(mobile, token) {
            try {
                const response = await fetch(`/api/admin/add-token?username=${ADMIN_CRED.username}&password=${ADMIN_CRED.password}&mobile=${mobile}&token=${encodeURIComponent(token)}`);
                const data = await response.json();
                
                if (data.success) {
                    showToast('Token added successfully');
                    await loadDashboard();
                } else {
                    throw new Error(data.error || 'Failed to add token');
                }
            } catch (error) {
                showToast('Error: ' + error.message, true);
            }
        }
        
        function searchUsers() {
            const term = document.getElementById('searchUser').value.toLowerCase();
            const cards = document.querySelectorAll('#usersList .card');
            
            cards.forEach(card => {
                const mobile = card.getAttribute('data-mobile') || '';
                card.style.display = mobile.includes(term) ? '' : 'none';
            });
        }
        
        function logout() {
            localStorage.removeItem('adminAuth');
            window.location.href = '/';
        }
        
        // Check admin session
        const savedAuth = localStorage.getItem('adminAuth');
        if (savedAuth) {
            ADMIN_CRED = JSON.parse(savedAuth);
            loadDashboard();
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
